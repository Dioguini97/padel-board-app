<div>
    <span>
        <p>Set: {{set}}</p>
        <p>Game: {{game}}</p>
        <p *ngIf="isTiebreak">Tiebreak</p>
    </span>
    
    <div id="score-this-game">{{pointsToScore(teamAPointsThisGame, teamBPointsThisGame)}}</div>
    <button id="temaA-point-button" (click)="addPointToTeamA()">Team A Point</button>
    <button id="temaB-point-button" (click)="addPointToTeamB()">Team B Point</button>
    <div id="this-set-games-score-band">{{teamANumberOfGamesThisSet}} - {{teamBNumberOfGamesThisSet}}</div>
    <div id="games-score-band" *ngFor="let i of gamesPerSetTeamA; index as j">{{this.gamesPerSetTeamA[j]}} - {{this.gamesPerSetTeamB[j]}}</div>
    <div id="sets-score-band"></div>
</div>
